name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  meta-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Meta governance + scripts
        run: ./scripts/ci-verify.sh

      - name: Template checks (monorepo layout only)
        run: ./scripts/ci-template-if-present.sh
